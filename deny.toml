# cargo-deny config for bigcedilla.
# Run: cargo deny check

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "GPL-3.0",
    "GPL-3.0-or-later",
    "0BSD",
    "CC0-1.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    # bigcedilla must not pull a network/HTTP client.
    { name = "reqwest" },
    { name = "hyper" },
    { name = "ureq" },
    { name = "isahc" },
    # No telemetry.
    { name = "sentry" },
    { name = "opentelemetry" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
